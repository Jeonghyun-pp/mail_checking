# Production stack — single VM, all services on one Docker network.
#
# Run with the prod env file so ${...} substitution works:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# The app port is bound to 127.0.0.1 only — it is NOT on any public
# interface. Tailscale (`tailscale serve`) proxies it to the tailnet.

services:
  postgres:
    image: postgres:16-alpine
    container_name: mailchecking_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mailchecking_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies pending Prisma migrations, then exits. app/worker wait
  # for it to finish successfully before starting.
  migrate:
    image: mailchecking:local
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: mailchecking:local
    build:
      context: .
      target: runtime
    container_name: mailchecking_app
    restart: unless-stopped
    command: ["npm", "run", "start"]
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    # localhost only — Tailscale serves it to the tailnet.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    image: mailchecking:local
    container_name: mailchecking_worker
    restart: unless-stopped
    command: ["npx", "tsx", "src/worker/index.ts"]
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
